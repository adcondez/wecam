<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; font-family: 'DM Sans', sans-serif; padding: 0; margin: 0; height: 100%; overflow: hidden; }
  body { display: flex; align-items: stretch; }
  .banner {
    background-color: #14134A;
    background-image: linear-gradient(120deg, #aaa6eb 0%, #dcf6f7 100%);
    border-radius: 14px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 28px;
    overflow: hidden;
    position: relative;
    flex: 1;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 30%;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .col-text {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #554ed8;
    margin-bottom: 8px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    color: #14134A;
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #3a3870;
    line-height: 1.55;
    margin-bottom: 22px;
    max-width: 420px;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, opacity 0.15s;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .btn:hover { transform: translateY(-1px); opacity: 0.92; }
  .btn:active { transform: translateY(0); opacity: 1; }
  .btn-primary {
    background: #554ed8;
    color: #ffffff;
  }
  .btn-secondary {
    background: #ffffff;
    color: #14134A;
    border: 1px solid #aaa6eb;
  }
  .col-image {
    flex-shrink: 0;
    width: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  @media (max-width: 520px) {
    .col-image { display: none; }
    .banner { padding: 24px 20px; }
  }
</style>
</head>
<body>
<div class="banner">
  <div class="col-text">
    <p class="eyebrow">Tu opinión importa</p>
    <h2 class="title">¿Cómo está funcionando<br>el sistema para ti?</h2>
    <p class="subtitle">Comparte peticiones, reporta un problema o cuéntanos qué mejorarías. Cada mensaje nos ayuda a hacer la plataforma más útil para tu estudio.</p>
    <div class="btn-row">
      <a href="REEMPLAZAR_URL_FEEDBACK" target="_blank" class="btn btn-primary">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Enviar feedback
      </a>
      <a href="REEMPLAZAR_URL_WHATSAPP" target="_blank" class="btn btn-secondary">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Contactar a soporte
      </a>
    </div>
  </div>
  <div class="col-image" aria-hidden="true">
    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="52" fill="rgba(85,78,216,0.08)"/>
      <rect x="22" y="30" width="76" height="52" rx="9" fill="#ffffff" stroke="#aaa6eb" stroke-width="1.5"/>
      <rect x="32" y="42" width="36" height="5" rx="2.5" fill="#554ed8"/>
      <rect x="32" y="52" width="56" height="3.5" rx="1.75" fill="#aaa6eb"/>
      <rect x="32" y="59" width="46" height="3.5" rx="1.75" fill="#aaa6eb"/>
      <rect x="32" y="66" width="30" height="3.5" rx="1.75" fill="#dcf6f7"/>
      <rect x="32" y="75" width="22" height="7" rx="3.5" fill="#554ed8"/>
      <circle cx="89" cy="38" r="13" fill="#4ed1d8"/>
      <path d="M84 38l3.5 3.5L94 33" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>
</body>
</html>
